name: Build & Publish Docker Image

on:
  push:
    branches:
      - master
      - "feature/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master

env:
  IMAGE_NAME: mibmal/tiddlywiki

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # for GHCR if you ever switch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extract version from package.json for tagging
      - name: Read app version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      # Generate tags:
      #   push to master          → :latest + :<appversion>-<sha>
      #   push tag v5.4.0         → :5.4.0 + :latest
      #   PR                      → :pr-<number> (no push)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.app_version }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=ref,event=pr,prefix=pr-

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the GitHub Actions cache for faster rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Update Docker Hub description
        if: github.ref == 'refs/heads/master'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "TiddlyWiki5 — distroless, non-root, production-ready"
          readme-filepath: ./readme.md
